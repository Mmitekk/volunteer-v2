		<script>
			let metrics = {};
			const observer = new PerformanceObserver((list) => {
				const entries = list.getEntries();

				entries.forEach((entry) => {
					// 根据不同的entry类型处理不同的性能指标
					switch (entry.entryType) {
						case 'navigation':
							{
								const navEntry = entry;
								metrics = {
									...metrics,
									dns: navEntry.domainLookupEnd - navEntry.domainLookupStart,
									response: navEntry.responseEnd - navEntry.responseStart,
									dom_parse: navEntry.domInteractive - navEntry.responseEnd,
									dom_ready: navEntry.domContentLoadedEventEnd - navEntry.fetchStart,
									resource: navEntry.domComplete - navEntry.domContentLoadedEventEnd,
									first_interactive: navEntry.domInteractive - navEntry.fetchStart,
									first_byte: navEntry.responseStart - navEntry.domainLookupStart,
									loaded: navEntry.loadEventEnd - navEntry.fetchStart
								};
								sessionStorage.setItem('performance', JSON.stringify(metrics));
								// 发送性能指标到阿里云日志服务
							}
							break;

						case 'paint':
							if (entry.name === 'first-paint') {
								metrics = {
									...metrics,
									first_paint: entry.startTime
								};
								sessionStorage.setItem('performance', JSON.stringify(metrics));
							}
							if (entry.name === 'first-contentful-paint') {
								metrics = {
									...metrics,
									first_contentful_paint: entry.startTime
								};
								sessionStorage.setItem('performance', JSON.stringify(metrics));
							}
							break;
					}
				});
			});

			// 观察的性能指标类型
			observer.observe({
				entryTypes: ['navigation', 'paint']
			});
		</script>

							if (href.startsWith('javascript:')) return;

							if (href === '#') {

      font-weight: 500;
      color: var(--color-white);
      margin-bottom: 6px;
    }

      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
    }

    .faq-section {
      padding: 80px 24px;
      background: var(--color-white);
    }

    .faq-section__header {
      text-align: center;
      max-width: 520px;
      margin: 0 auto 44px;
    }

    .faq-section__title {
      font-family: var(--font-heading);
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 600;
      color: var(--color-dark);
      line-height: 1.3;
    }

    .faq-list {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    .faq-item {
      border-bottom: 1px solid var(--color-light-gray);
    }

    .faq-item:first-child {
      border-top: 1px solid var(--color-light-gray);
    }

    .faq-item__question {
      width: 100%;
      background: none;
      border: none;
      padding: 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      text-align: left;
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 500;
      color: var(--color-dark);
      transition: color 0.2s ease;
    }

    .faq-item__question:hover {
      color: var(--color-gold-dark);
    }

    .faq-item__arrow {
      flex-shrink: 0;
      font-size: 20px;
      color: var(--color-gold-dark);
      transition: transform 0.3s ease;
    }

    .faq-item.is-open .faq-item__arrow {
      transform: rotate(180deg);
    }

    .faq-item__answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
    }

    .faq-item.is-open .faq-item__answer {
      max-height: 300px;
      padding-bottom: 20px;
    }

    .faq-item__answer p {
      font-size: 14px;
      line-height: 1.8;
      color: var(--color-warm-gray);
    }

    /* ===== CONTACT BAR ===== */
    .contact-bar {
      padding: 48px 24px;
      background: var(--color-cream-dark);
    }

    .contact-bar__inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
      text-align: center;
    }

    .contact-bar__text {
      font-size: 15px;
      color: var(--color-warm-gray);
    }

    .contact-bar__text strong {
      color: var(--color-dark);
    }

    .contact-bar__links {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .contact-bar__link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .contact-bar__link--primary {
      background: var(--color-burgundy);
      color: var(--color-white);
    }

    .contact-bar__link--primary:hover {
      background: var(--color-burgundy-light);
    }

    .contact-bar__link--secondary {
      background: var(--color-white);
      color: var(--color-dark);
      border: 1px solid var(--color-light-gray);
    }

    .contact-bar__link--secondary:hover {
      border-color: var(--color-gold);
      color: var(--color-gold-dark);
    }

    .contact-bar__link .iconify {
      font-size: 18px;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .animate-in.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .hero-closed {
        min-height: 420px;
      }

      .notify-form__row {
        flex-direction: column;
      }

      .contact-bar__inner {
        flex-direction: column;
        gap: 20px;
      }

      .about-grid {
        grid-template-columns: 1fr;
      }
    }

  &lt;script&gt;
    // ===== Scroll animations =====
    function initScrollAnimations() {
      const elements = document.querySelectorAll('.animate-in');
      const observer = new IntersectionObserver(
        (entries) =&gt; {
          entries.forEach((entry, index) =&gt; {
            if (entry.isIntersecting) {
              setTimeout(() =&gt; {
                entry.target.classList.add('is-visible');
              }, index * 80);
              observer.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.15, rootMargin: '0px 0px -40px 0px' }
      );
      elements.forEach((el) =&gt; observer.observe(el));
    }

    // ===== FAQ toggle =====
    function toggleFaq(button) {
      const item = button.closest('.faq-item');
      const wasOpen = item.classList.contains('is-open');
      document.querySelectorAll('.faq-item.is-open').forEach((el) =&gt; {
        el.classList.remove('is-open');
      });
      if (!wasOpen) {
        item.classList.add('is-open');
      }
    }

    // ===== Form submit =====
    function handleNotifySubmit(e) {
      e.preventDefault();
      const form = document.getElementById('notifyForm');
      const btn = document.getElementById('notifyBtn');
      const success = document.getElementById('notifySuccess');

      btn.textContent = 'Отправка...';
      btn.disabled = true;
      btn.style.opacity = '0.7';

      setTimeout(() =&gt; {
        form.style.display = 'none';
        success.classList.add('is-visible');
      }, 1200);

      return false;
    }

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () =&gt; {
      initScrollAnimations();
    });
  &lt;/script&gt;
